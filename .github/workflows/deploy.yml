name: Deploy to Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WEBHOOK_URL: https://webhooks.amplify.us-east-1.amazonaws.com/prod/webhooks?id=f2bf673c-c44a-48be-939e-d73829a32444&token=c9RyKsgFOvKsx7RjzqWcsbMY9x1NDDijmWHB1y5AME

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify Build
        run: |
          echo "Triggering Amplify build via webhook..."
          curl -X POST "${{ env.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --silent --show-error --fail
          echo "Build triggered successfully!"
