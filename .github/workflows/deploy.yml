name: Deploy to Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WEBHOOK_URL: https://webhooks.amplify.us-east-1.amazonaws.com/prod/webhooks?id=d681697a-7a87-4c66-8f35-164a10822c74&token=aqSedKP1GKnOcScCeQW89F0vCBqQzLyt8IpXZy28

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify Build
        run: |
          echo "Triggering Amplify build via webhook..."
          curl -X POST "${{ env.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --silent --show-error --fail
          echo "Build triggered successfully!"
