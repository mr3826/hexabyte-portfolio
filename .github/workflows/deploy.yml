name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Project
        run: pnpm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # e.g., us-east-1

      - name: Zip build output
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..

      - name: Deploy to AWS Amplify
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH_NAME: main
        run: |
          # 1. Create a deployment in Amplify
          DEPLOYMENT=$(aws amplify create-deployment --app-id $AMPLIFY_APP_ID --branch-name $BRANCH_NAME)
          
          # 2. Extract upload URL and jobId
          UPLOAD_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')
          
          # 3. Upload the zipped build artifact
          curl -H "Content-Type: application/zip" --upload-file deploy.zip "$UPLOAD_URL"
          
          # 4. Start the deployment job
          aws amplify start-deployment --app-id $AMPLIFY_APP_ID --branch-name $BRANCH_NAME --job-id $JOB_ID
          
          echo "Deployment initiated! Job ID: $JOB_ID"
