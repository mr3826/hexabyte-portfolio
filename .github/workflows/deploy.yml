name: Deploy to AWS Amplify v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean Build Cache
        run: rm -rf node_modules/.vite dist

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Deploy to AWS Amplify v2
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH_NAME: main
        run: |
          echo "Deploying to Amplify App: $AMPLIFY_APP_ID"
          
          # Create deployment
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --output json)
          
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')
          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          
          echo "Upload URL: $UPLOAD_URL"
          echo "Job ID: $JOB_ID"
          
          # Zip and upload
          cd dist
          zip -r ../deploy.zip .
          cd ..
          
          curl -H "Content-Type: application/zip" \
            --upload-file deploy.zip \
            "$UPLOAD_URL"
          
          # Start deployment
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$BRANCH_NAME" \
            --job-id "$JOB_ID"
          
          echo "Deployment initiated! Job ID: $JOB_ID"

      - name: Wait for Deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH_NAME: main
        run: |
          echo "Waiting for deployment to complete..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$BRANCH_NAME" \
              --job-id "$JOB_ID" \
              --query 'job.status' \
              --output text)
            
            echo "Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS - Status: $STATUS"
            
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Deployment completed successfully!"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done
          
          echo "Timeout waiting for deployment"
          exit 1
