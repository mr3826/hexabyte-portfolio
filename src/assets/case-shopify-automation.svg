<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shopify Automation Case Study</title>
  <desc id="desc">Abstract architecture dashboard visual for event-driven Shopify automation workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091221"/>
      <stop offset="100%" stop-color="#0f2a38"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1de9b6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="150" fill="#00d9ff" opacity="0.12"/>
  <circle cx="120" cy="620" r="180" fill="#1de9b6" opacity="0.1"/>

  <rect x="70" y="70" width="1060" height="560" rx="28" fill="#0e1926" stroke="#1f3d4e"/>
  <rect x="105" y="120" width="320" height="120" rx="16" fill="url(#card)" stroke="#2f7e92"/>
  <rect x="440" y="120" width="320" height="120" rx="16" fill="url(#card)" stroke="#2f7e92"/>
  <rect x="775" y="120" width="320" height="120" rx="16" fill="url(#card)" stroke="#2f7e92"/>

  <rect x="105" y="280" width="990" height="300" rx="18" fill="#0b1520" stroke="#254355"/>
  <polyline points="150,520 270,460 390,490 510,420 630,470 750,380 870,430 1020,340" fill="none" stroke="#1de9b6" stroke-width="6"/>

  <text x="105" y="95" fill="#a7d3df" font-family="Arial, sans-serif" font-size="24" font-weight="700">Shopify Automation</text>
  <text x="120" y="175" fill="#d8f4ff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Event Ingestion</text>
  <text x="455" y="175" fill="#d8f4ff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Workflow Router</text>
  <text x="790" y="175" fill="#d8f4ff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Fulfillment Sync</text>
  <text x="120" y="320" fill="#8ec9d7" font-family="Arial, sans-serif" font-size="22">Cross-channel ops visibility</text>
</svg>
